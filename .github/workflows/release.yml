name: Release

on:
  # Releases are manual: push a SemVer tag (`v0.2.0`, `v1.0.0-rc.1`, etc.)
  # and CI builds+publishes it. No more auto-tag-on-every-main-push.
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.2.0)'
        required: true

# One release per commit SHA; cancel superseded in-flight runs.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create the GitHub Release

# Opt into the Node.js 24 runtime for all JavaScript actions ahead of the
# June 2026 forced switch, per
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# All the actions we use (@v4 generation) support it already; this just
# silences the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can generate changelog since last tag
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nexus/package-lock.json

      - name: Resolve release version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          # For tag pushes, github.ref_name is the tag itself (e.g. "v0.2.0").
          # For workflow_dispatch, the operator passes the tag as an input.
          VERSION="${INPUT_TAG:-$REF_NAME}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Release tag must be SemVer (e.g. v0.2.0, v1.0.0-rc.1); got: ${VERSION}"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release: ${VERSION}"

      - name: Install deps
        working-directory: nexus
        run: npm ci

      - name: Typecheck
        working-directory: nexus
        run: npx tsc --noEmit

      # Restore webpack's incremental build cache. Key is tight (lockfile +
      # source hashes) so a code change invalidates, but the restore-keys
      # fallback lets us reuse the previous build's cache for the unchanged
      # portions — dramatically cuts CI build time after the first run.
      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: nexus/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('nexus/package-lock.json') }}-${{ hashFiles('nexus/src/**/*.{ts,tsx,js,jsx,css}', 'nexus/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('nexus/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        working-directory: nexus
        run: npm run build
        env:
          # Disable Next.js telemetry in CI builds.
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Prune to production deps
        working-directory: nexus
        run: npm prune --omit=dev

      - name: Write VERSION file
        working-directory: nexus
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "$VERSION" > VERSION

      - name: Create release tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Tarball contents:
          #   server.ts, src/lib/ (imported by server.ts under --experimental-
          #   strip-types, NOT compiled into .next), .next/ (minus cache),
          #   public/, node_modules/ (prod only), package.json,
          #   package-lock.json, VERSION, scripts/.
          #
          # src/lib is the ONLY part of src/ that ships — src/app,
          # src/components, src/hooks are all compiled into .next/ and don't
          # need to travel as raw .ts. src/lib does because server.ts
          # imports relative files from it and runs as raw TypeScript via
          # --experimental-strip-types (no bundler resolver).
          #
          # Transforms: strip the nexus/ prefix so extraction is flat.
          TARBALL="nexus-${VERSION}.tar.gz"
          tar -czf "$TARBALL" \
            --exclude='nexus/.next/cache' \
            --exclude='nexus/.git' \
            --exclude='nexus/src/lib/*.test.ts' \
            --exclude='nexus/node_modules/.cache' \
            --transform 's,^nexus/,,' \
            nexus/server.ts \
            nexus/src/lib \
            nexus/.next \
            nexus/public \
            nexus/node_modules \
            nexus/package.json \
            nexus/package-lock.json \
            nexus/VERSION \
            nexus/scripts
          # Post-build sanity: the chain server.ts imports from src/lib
          # must actually be inside the tarball. Fails fast in CI if a
          # future edit accidentally breaks this contract.
          for f in server.ts src/lib/scheduler.ts src/lib/run-script-job.ts \
                   src/lib/cron-match.ts src/lib/scheduled-jobs-store.ts \
                   src/lib/exec-audit.ts src/lib/remote-shell.ts \
                   src/lib/script-jobs.ts; do
            tar -tzf "$TARBALL" "$f" >/dev/null || {
              echo "::error::Missing $f in release tarball"; exit 1;
            }
          done
          ls -lh "$TARBALL"

      - name: Generate SHA256 checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TARBALL="nexus-${VERSION}.tar.gz"
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          cat "${TARBALL}.sha256"

      - name: Generate release notes
        env:
          # Both env vars come from trusted GitHub-controlled context: REPO is
          # the repo full-name (validated by GitHub at workflow load), VERSION
          # is the SemVer tag we just validated above. Neither is operator
          # free-text. Commit messages (user content) NEVER touch the shell —
          # they're piped through git → awk and end up as awk printf %s
          # substitutions, which don't interpret format specifiers. Safe per
          # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Resolve the previous release tag — the one immediately before the
          # tag we're publishing now. The previous version of this script
          # picked the most-recent tag without excluding the current ref,
          # which silently produced empty changelog sections (an empty
          # "${VERSION}..HEAD" range).
          PREV=$(git tag --list 'v*' --sort=-creatordate \
                  | grep -v -x -F "${VERSION}" \
                  | head -1 || true)

          # Conventional-commit categorisation. Each bucket grabs the lines
          # matching its prefix (case-insensitive) and strips the prefix +
          # optional scope so the rendered list reads cleanly. REPO is
          # passed to awk via -v so user-controlled commit messages can't
          # interfere with the shell quoting.
          render_section() {
            local heading="$1"
            local pattern="$2"
            local content
            content=$(git log --pretty=format:'%H%x09%s' "${PREV}..HEAD" \
                       | awk -F'\t' -v pat="$pattern" 'tolower($2) ~ pat { print $0 }' \
                       | awk -F'\t' -v repo="$REPO" '{
                           sha = substr($1, 1, 7);
                           msg = $2;
                           # Strip the leading "type(scope): " or "type: " prefix.
                           sub(/^[a-zA-Z]+(\([^)]+\))?!?:[ ]*/, "", msg);
                           printf("- %s ([%s](https://github.com/%s/commit/%s))\n", msg, sha, repo, $1);
                         }')
            if [[ -n "$content" ]]; then
              echo ""
              echo "### $heading"
              echo ""
              echo "$content"
            fi
          }

          {
            echo "## What's changed"
            echo ""
            if [[ -z "$PREV" ]]; then
              echo "Initial release."
            else
              echo "Commits since [\`${PREV}\`](https://github.com/${REPO}/releases/tag/${PREV}) → [\`${VERSION}\`](https://github.com/${REPO}/releases/tag/${VERSION}):"

              render_section "Features"      '^feat'
              render_section "Bug fixes"     '^fix'
              render_section "Performance"   '^perf'
              render_section "Refactoring"   '^refactor'
              render_section "Tests"         '^test'
              render_section "Documentation" '^docs'
              render_section "Build / CI"    '^(build|ci)'
              render_section "Chores"        '^chore'

              # Anything that doesn't match a conventional-commit prefix
              # falls into "Other" so nothing is silently dropped.
              OTHER=$(git log --pretty=format:'%H%x09%s' "${PREV}..HEAD" \
                       | awk -F'\t' '$2 !~ /^(feat|fix|perf|refactor|test|docs|build|ci|chore)(\([^)]+\))?!?:/ { print $0 }' \
                       | awk -F'\t' -v repo="$REPO" '{
                           sha = substr($1, 1, 7);
                           printf("- %s ([%s](https://github.com/%s/commit/%s))\n", $2, sha, repo, $1);
                         }')
              if [[ -n "$OTHER" ]]; then
                echo ""
                echo "### Other"
                echo ""
                echo "$OTHER"
              fi

              # Diff stats — totals for the release.
              echo ""
              echo "### Diff stats"
              echo ""
              echo '```'
              git diff --shortstat "${PREV}..HEAD"
              echo '```'
              echo ""
              echo "**Full diff:** [\`${PREV}...${VERSION}\`](https://github.com/${REPO}/compare/${PREV}...${VERSION})"
            fi

            echo ""
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "bash <(curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh)"
            echo '```'
            echo ""
            echo "## Update an existing install"
            echo ""
            echo 'From the Nexus UI → System → Updates → **Install update**, or run:'
            echo ""
            echo '```bash'
            echo "nexus-update"
            echo '```'
          } > RELEASE_NOTES.md

          echo "─── Generated release notes ───────────────────────────"
          cat RELEASE_NOTES.md
          echo "───────────────────────────────────────────────────────"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            nexus-${{ steps.version.outputs.version }}.tar.gz
            nexus-${{ steps.version.outputs.version }}.tar.gz.sha256
          make_latest: 'true'
          fail_on_unmatched_files: true
