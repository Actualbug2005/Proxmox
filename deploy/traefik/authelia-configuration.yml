# Authelia configuration template for Nexus.
#
# Deploy to: ./authelia/config/configuration.yml (mounted into the
# authelia container at /config/configuration.yml by docker-compose.yml).
#
# Key decisions locked for Nexus's threat model:
#   - TWO-factor required for Nexus (webauthn or TOTP). Root-equivalent
#     endpoint; don't skimp.
#   - 8h session matches Nexus's own SESSION_TTL_MS.
#   - File-based user DB — swap to LDAP/OIDC for shared deployments.
#   - Regulation: 5 failed auth attempts → 5 min ban. Hard-blocks the
#     attacker even if CrowdSec hasn't caught up yet.

theme: dark

server:
  address: tcp://0.0.0.0:9091
  path: ""
  buffers:
    read: 4096
    write: 4096

log:
  level: info
  file_path: /config/authelia.log
  format: json

totp:
  issuer: nexus.example.com
  period: 30
  skew: 1

webauthn:
  disable: false
  timeout: 60s
  display_name: Nexus Homelab
  attestation_conveyance_preference: indirect
  user_verification: preferred

# Authentication backend — file is fine for a homelab with 2-3 admins.
# For larger deployments switch to LDAP (bind against your IdP).
authentication_backend:
  password_reset:
    disable: true  # reset out-of-band via SSH + authelia reset-password
  refresh_interval: 5m
  file:
    path: /config/users_database.yml
    watch: true
    password:
      algorithm: argon2
      argon2:
        variant: argon2id
        iterations: 3
        memory: 64
        parallelism: 4
        key_length: 32
        salt_length: 16

# Access control policy.
# `two_factor` = must pass both password and WebAuthn/TOTP.
access_control:
  default_policy: deny
  rules:
    # Nexus itself — MFA required for every request.
    - domain: nexus.example.com
      policy: two_factor
      subject: "group:nexus-admins"

    # Authelia login page must be reachable unauthenticated (bootstrap).
    - domain: auth.example.com
      policy: one_factor

session:
  name: authelia_session
  # Matches Nexus's SESSION_TTL_MS.
  expiration: 8h
  inactivity: 1h
  remember_me_duration: 0  # no "remember me" — re-MFA every session
  cookies:
    - domain: example.com
      authelia_url: https://auth.example.com
      default_redirection_url: https://nexus.example.com
  redis:
    host: redis
    port: 6379

# Brute-force guard. Complements Nexus's app-level and CrowdSec's L3/L4.
regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 5m

# Storage — SQLite for single-node; swap to postgres for HA.
storage:
  encryption_key_file: /secrets/storage_key
  local:
    path: /config/db.sqlite3

notifier:
  disable_startup_check: true
  # For a homelab without email, use filesystem notifier — Authelia writes
  # reset links / MFA enrollment URLs to a local file you can cat.
  filesystem:
    filename: /config/notifications.txt

identity_providers:
  # Leave empty unless you want Authelia to also act as an OIDC provider
  # for other homelab services.
