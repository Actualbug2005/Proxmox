# ─── Nexus nginx config ─────────────────────────────────────────────────────
#
# Terminates TLS for Nexus on Tailscale's 100.x tailnet. Pair with a
# Tailscale ACL (deploy/nginx/tailscale-acl.hujson) that restricts who
# can reach the tagged node at all — ZTNA at the network layer.
#
# Deploy:
#   /etc/nginx/sites-available/nexus.conf    this file
#   ln -s ../sites-available/nexus.conf /etc/nginx/sites-enabled/nexus
#   nginx -t && systemctl reload nginx
#
# Cert management (two options):
#   1. Tailscale MagicDNS + `tailscale cert` for a LetsEncrypt cert via
#      Tailscale's plumbing. Add a systemd timer to rotate.
#   2. Your own ACME client pointing at the public DNS record that
#      resolves to the tailnet IP. Requires split-horizon DNS.

# Rate-limit zone (belt-and-braces alongside CrowdSec).
# 10 requests/sec per IP bucket, 50 requests burst, delay queued
# excess requests rather than reject outright.
limit_req_zone $binary_remote_addr zone=nexus_general:10m rate=10r/s;
# Login gets a much tighter bucket. CrowdSec is primary; this is fallback.
limit_req_zone $binary_remote_addr zone=nexus_login:10m rate=2r/s;

# ── HTTP → HTTPS redirect (catch-all) ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nexus.example.ts.net;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS vhost ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nexus.example.ts.net;

    # Cert paths — adjust for your cert source.
    ssl_certificate     /var/lib/tailscale/certs/nexus.example.ts.net.crt;
    ssl_certificate_key /var/lib/tailscale/certs/nexus.example.ts.net.key;

    # Modern TLS only. TLS 1.2 floor, prefer 1.3. Mozilla "intermediate"
    # cipher suite list as of 2025.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers (Phase 2 audit H6) ──────────────────────────────
    # add_header emits these on every response with a 200/201/204/206/301/
    # 302/303/304/307/308 status. The `always` flag extends to error
    # responses — critical for CSP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-src 'self' https://*.proxmox.com:8006; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Hide nginx version.
    server_tokens off;
    more_clear_headers 'Server';
    more_clear_headers 'X-Powered-By';

    # Cap inbound body at 12 MB — Nexus app enforces 10 MB on /api/proxmox/*;
    # this is the outer ingress bound. ISO-upload route expects larger
    # bodies (up to iso-storage cap) — carve a dedicated location for it.
    client_max_body_size 12m;

    # ── Dedicated location: login (tighter rate limit) ───────────────────
    location = /api/auth/login {
        limit_req zone=nexus_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include    /etc/nginx/snippets/nexus-proxy-headers.conf;
    }

    # ── Dedicated location: ISO upload (larger body allowed) ─────────────
    location = /api/iso-upload {
        client_max_body_size 20g;  # match PVE storage's real bound
        limit_req zone=nexus_general burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include    /etc/nginx/snippets/nexus-proxy-headers.conf;
        proxy_request_buffering off;  # stream large bodies
    }

    # ── Dedicated location: WebSocket relay (termproxy) ──────────────────
    location = /api/ws-relay {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;  # 1h idle timeout for xterm sessions
        include /etc/nginx/snippets/nexus-proxy-headers.conf;
    }

    # ── Default location: everything else ────────────────────────────────
    location / {
        limit_req zone=nexus_general burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include    /etc/nginx/snippets/nexus-proxy-headers.conf;
    }

    access_log /var/log/nginx/nexus.access.log;
    error_log  /var/log/nginx/nexus.error.log warn;
}
