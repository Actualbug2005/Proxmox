# nginx snippet — standard proxy headers for Nexus.
# Included by each location {} in nexus.conf.
#
# Deploy:
#   /etc/nginx/snippets/nexus-proxy-headers.conf

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
# Critical: Nexus's cookie logic reads this to decide `secure: true`.
proxy_set_header X-Forwarded-Proto https;
proxy_set_header X-Forwarded-Host  $host;

# Don't let upstream Set-Cookie override the hardened ingress cookies.
# Nexus's own cookies (nexus_session, nexus_csrf) pass through because
# they're not intercepted here — this only strips accidental extras.
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# Upstream timeouts. Balanced against Phase 1's EXEC_LIMITS (45 min max
# for exec/scripts.run). Anything longer is a bug in the script.
proxy_connect_timeout 10s;
proxy_send_timeout    45m;
proxy_read_timeout    45m;

# Disable buffering for streaming responses (xterm output, task logs).
proxy_buffering       off;
